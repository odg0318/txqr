name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build txqr binaries for multiple platforms
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Extract version info
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          COMMIT=$(git rev-parse --short HEAD)
          echo "COMMIT=$COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags \
          "-X main.Version=${{ steps.version.outputs.VERSION }} \
           -X main.Commit=${{ steps.version.outputs.COMMIT }} \
           -X main.BuildDate=${{ steps.version.outputs.BUILD_DATE }}" \
          -o txqr${{ matrix.ext }} ./cmd/txqr

      - name: Create archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip txqr-${{ matrix.suffix }}.zip txqr${{ matrix.ext }}
          else
            tar czf txqr-${{ matrix.suffix }}.tar.gz txqr${{ matrix.ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: txqr-${{ matrix.suffix }}
          path: txqr-${{ matrix.suffix }}.*

  # Build Android APK
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform Docker builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build APK
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.android \
            --target apk-builder \
            --output type=local,dest=./build \
            .

      - name: Extract APK from build
        run: |
          cp build/output/txqr.apk ./txqr-${{ steps.get_version.outputs.VERSION }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: txqr-${{ steps.get_version.outputs.VERSION }}.apk

  # Create release with all artifacts
  create-release:
    needs: [release, android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "txqr-*" -exec cp {} release/ \;
          find artifacts -type f -name "*.apk" -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## txqr ${{ steps.get_version.outputs.VERSION }}

            ### 📱 Android APK
            - Download `txqr-${{ steps.get_version.outputs.VERSION }}.apk` below
            - Install on Android device (enable "Unknown sources" in settings)

            ### 💻 Desktop Binaries
            | Platform | File |
            |----------|------|
            | macOS Apple Silicon | `txqr-darwin-arm64.tar.gz` |
            | macOS Intel | `txqr-darwin-amd64.tar.gz` |
            | Linux x64 | `txqr-linux-amd64.tar.gz` |
            | Linux ARM64 | `txqr-linux-arm64.tar.gz` |
            | Windows x64 | `txqr-windows-amd64.zip` |

            ### Usage
            ```bash
            # Generate QR code from file
            txqr write myfile.txt

            # Display QR code in terminal
            txqr write --terminal myfile.txt

            # Pipe input
            echo 'hello' | txqr write

            # Start QR reader web server
            txqr read

            # Show version
            txqr version
            ```
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
