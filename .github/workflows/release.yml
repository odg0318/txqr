name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o txqr ./cmd/txqr

      - name: Create tar.gz
        run: |
          tar czf txqr-darwin-arm64.tar.gz txqr

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: txqr-darwin-arm64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
